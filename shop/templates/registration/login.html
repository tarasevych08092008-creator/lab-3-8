{% extends 'shop/base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
    <div style="background: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=2000') no-repeat center center/cover; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;"></div>

    <div class="auth-container">
        <div class="glass-auth-card">
            <h2 style="margin-bottom: 40px; font-weight: 300; letter-spacing: 4px;">LOGIN</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="input-group">
                    <span class="icon">👤</span>
                    <input type="text" name="username" required placeholder="Username">
                </div>

                <div class="input-group">
                    <span class="icon">🔒</span>
                    <input type="password" name="password" required placeholder="Password">
                </div>

                <button type="submit" class="btn-blue-solid">SIGN IN</button>
            </form>

            <div class="auth-footer">
                <p>New here? <a href="{% url 'register' %}">Create Account</a></p>
                <p><a href="{% url 'password_reset' %}" style="font-size: 13px; opacity: 0.8;">Forgot Password?</a></p>
            </div>
        </div>
    </div>
    
{% endblock %}
