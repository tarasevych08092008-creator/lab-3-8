{% extends 'shop/base.html' %}
{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 0 auto; color: white;">
    <h2>Відновлення пароля</h2>
    <p>Введіть ваш email, і ми надішлемо вам посилання.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-success">Надіслати</button>
    </form>
</div>
{% endblock %}
